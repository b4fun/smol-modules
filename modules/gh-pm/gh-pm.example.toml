# gh-pm configuration example
# Copy this to ~/.gh-pm/gh-pm.toml and customize for your setup.

# ============================================================================
# Settings - Global behavior configuration
# ============================================================================
[settings]

# repos - List of GitHub repositories to monitor for assigned tasks
# Format: ["owner/repo-a", "owner/repo-b"]
# gh-pm will poll these repos for issues and PRs assigned to the authenticated user
repos = ["your-org/your-repo"]

# poll_interval - Seconds between GitHub polling cycles
# Default: 60
# Lower values = more responsive, higher API usage
poll_interval = 60

# workflow_timeout - Timeout in seconds for workflows
# Default: 3600 (1 hour)
# After this time without a result.json, workflows are considered timed out and retried
workflow_timeout = 3600

# max_retries - Maximum retry attempts for timed-out workflows
# Default: 3
# After this many retries, the task is marked as failed
max_retries = 3

# log_level - Logging verbosity
# Options: DEBUG, INFO, WARN, ERROR
# Default: INFO
log_level = "INFO"

# log_file - Path to global log file
# Optional. If unset, logs go to stderr only.
# Supports ~ expansion for home directory
log_file = "~/.gh-pm/gh-pm.log"

# workflow_command - Command to execute when dispatching a workflow
# Required. The task directory path is passed as the first argument.
# Example: "/home/user/bin/my-workflow-handler"
workflow_command = "/path/to/your/workflow-script"

# workflow_policy - Rules the workflow agent must follow
# This is injected into the agent prompt when using gh-pm-shelley-handler.
# If unset, a safe default policy is used that prevents merging PRs,
# pushing to main, and other destructive actions.
# Override to customize what the agent is allowed to do.
#
# Default (applied automatically when empty):
#   - Do NOT merge pull requests
#   - Do NOT push directly to main/master
#   - Do NOT delete branches or repositories
#   - Work on feature branches, open PRs for human review
#
# workflow_policy = "Do NOT merge PRs. Do NOT push to main. Always open a PR for review."

# attach_summaries - Enable attaching detailed summaries to GitHub comments
# Default: false
# When enabled, gh-pm will include detailed analysis and progress information
# in GitHub tracking comments based on the summary_* settings below.
attach_summaries = false

# summary_analyze - Include LLM analysis in dispatch comments
# Default: true
# When attach_summaries is enabled, this controls whether the LLM analysis
# from task.json is included in the initial "Task Dispatched" comment.
summary_analyze = true

# summary_running - Include detailed running status in progress updates
# Default: false
# When attach_summaries is enabled, this controls whether status.json details
# are included in "Task In Progress" comments. Note: This can be verbose.
summary_running = false

# summary_completion - Include enhanced completion details
# Default: true
# When attach_summaries is enabled, this controls whether artifacts and
# completion timestamps are included in the final "Task Completed" comment.
summary_completion = true

# summary_use_collapsible - Wrap summaries in collapsible <details> sections
# Default: true
# When enabled, long summaries are wrapped in collapsible sections to keep
# GitHub comments compact. Particularly useful for lengthy LLM analyses.
summary_use_collapsible = true

# summary_max_length - Maximum length of summary content before truncation
# Default: 5000
# Summaries longer than this will be truncated to avoid overly large comments.
# Set to a higher value if you need more verbose summaries.
summary_max_length = 5000

# Shelley workflow handler example:
# If using shelley as your workflow executor, point to the bundled handler:
# workflow_command = "/full/path/to/smol-modules/modules/gh-pm/bin/gh-pm-shelley-handler"
# 
# The shelley handler supports these environment variables:
#   GH_PM_SHELLEY_URL    - Shelley socket URL (default: unix:///home/$USER/.config/shelley/shelley.sock)
#   GH_PM_SHELLEY_MODEL  - Model override (default: claude-sonnet-4.5)
# 
# Example with shelley:
# workflow_command = "/home/exedev/smol-modules/modules/gh-pm/bin/gh-pm-shelley-handler"

# ============================================================================
# LLM Provider Profiles
# ============================================================================
# Define one or more LLM provider profiles. The profile named "default" is used
# for task analysis. You can define additional profiles for different models or
# providers, but only "default" is currently used by gh-pm.

# ----------------------------------------------------------------------------
# OpenAI (recommended for getting started)
# ----------------------------------------------------------------------------
[profiles.default]
model = "gpt-4o"                          # Model identifier
api_url = "https://api.openai.com/v1"    # API endpoint
api_key_env = "OPENAI_API_KEY"            # Environment variable containing your API key

# backend is optional - defaults to "openai" for OpenAI-compatible APIs
# Only set this when using SDK-based adapters (e.g., "anthropic", "openai-agents")
# backend = "openai"

# ----------------------------------------------------------------------------
# Local LLM via Ollama
# ----------------------------------------------------------------------------
# Uncomment to use a local model via Ollama (https://ollama.ai)
# Run: ollama serve
# [profiles.local]
# model = "llama3"
# api_url = "http://localhost:11434/v1"    # Ollama OpenAI-compatible endpoint
# api_key_env = "OLLAMA_API_KEY"           # Can be a dummy value if Ollama doesn't require auth

# ----------------------------------------------------------------------------
# Claude via OpenRouter (OpenAI-compatible proxy)
# ----------------------------------------------------------------------------
# OpenRouter provides OpenAI-compatible access to many models including Claude
# [profiles.claude-openrouter]
# model = "anthropic/claude-sonnet-4-20250514"
# api_url = "https://openrouter.ai/api/v1"
# api_key_env = "OPENROUTER_API_KEY"

# ----------------------------------------------------------------------------
# Shelley (local exe.dev agent)
# ----------------------------------------------------------------------------
# Uses the shelley agent running on the same host via its Unix socket.
# No API key needed — shelley handles LLM credentials internally.
# [profiles.shelley]
# backend = "shelley"
# model = "claude-sonnet-4.5"
# shelley_url = "unix:///home/USER/.config/shelley/shelley.sock"  # Optional override

# ----------------------------------------------------------------------------
# Claude via Anthropic SDK (requires SDK adapter)
# ----------------------------------------------------------------------------
# Direct Anthropic API access (not OpenAI-compatible)
# Requires backend="anthropic" to use SDK-based adapter
# [profiles.claude-direct]
# backend = "anthropic"
# model = "claude-sonnet-4-20250514"
# api_key_env = "ANTHROPIC_API_KEY"

# ----------------------------------------------------------------------------
# OpenAI with Agents SDK (requires SDK adapter)
# ----------------------------------------------------------------------------
# For using OpenAI's Agents API with specialized features
# [profiles.openai-agents]
# backend = "openai-agents"
# model = "gpt-4o"
# api_key_env = "OPENAI_API_KEY"

# ============================================================================
# Notes
# ============================================================================
# 
# 1. API Keys: Store your API keys as environment variables, never in this file.
#    Example: export OPENAI_API_KEY="sk-..."
#
# 2. GitHub Authentication: gh-pm uses the `gh` CLI for GitHub operations.
#    Authenticate once with: gh auth login
#
# 3. Workflow Command: Your workflow script receives the task directory as $1.
#    It should read task.json, do work, and write result.json.
#    See README.md "Directory Protocol" for details.
#
# 4. Testing: Use --dry-run to test configuration without side effects:
#    gh-pm --dry-run --once
